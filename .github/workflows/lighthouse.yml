name: Lighthouse score

on:
  pull_request:
    branches:
      - '**'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install static server
        run: npm install -g serve

      - name: Serve PR branch (background on port 3001)
        run: |
          serve . -l 3001 &
          sleep 5

      - name: Checkout main branch into separate folder
        run: |
          git fetch origin main
          git worktree add main-branch origin/main

      - name: Serve Main branch (background on port 3000)
        run: |
          cd main-branch
          serve . -l 3000 &
          cd ..
          sleep 5

      - name: Create Lighthouse config
        run: |
          cat <<EOF > lighthouserc.json
          {
            "ci": {
              "collect": {
                "url": ["http://localhost:3000", "http://localhost:3001"],
                "numberOfRuns": 1
              },
              "upload": {
                "target": "filesystem",
                "outputDir": "lhci_reports"
              }
            }
          }
          EOF

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true

      - name: Format Lighthouse report as Markdown
        id: format-report
        uses: iyu88/lighthouse-report-formatter@v1.0.0
        with:
          lh_directory: ./
          manifest_path: lhci_reports

      - name: Comment on PR with Lighthouse scores
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.format-report.outputs.comments }}
