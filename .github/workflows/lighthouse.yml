name: Lighthouse score

on:
  pull_request:
    branches:
      - '**'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install -g serve

      - name: Serve PR branch (port 3001)
        run: |
          serve . -l 3001 &
          sleep 5

      - name: Checkout main branch into separate folder
        run: |
          git fetch origin main
          git worktree add main-branch origin/main

      - name: Serve Main branch (port 3000)
        run: |
          cd main-branch
          serve . -l 3000 &
          cd ..
          sleep 5

      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        id: lighthouse
        with:
            urls: |
              http://localhost:3000/
              http://localhost:3001
            uploadArtifacts: true 
            temporaryPublicStorage: true 

      - name: Comment on PR with Lighthouse scores
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            **Lighthouse Scores for the PR and Main Branches:**

            **PR Branch (http://localhost:3001)**
            | Metric               | Score |
            | -------------------- | ----- |
            | Performance          | ${{ steps.lighthouse.outputs['http://localhost:3001.performance'] }} |
            | Accessibility        | ${{ steps.lighthouse.outputs['http://localhost:3001.accessibility'] }} |
            | Best Practices       | ${{ steps.lighthouse.outputs['http://localhost:3001.best-practices'] }} |
            | SEO                  | ${{ steps.lighthouse.outputs['http://localhost:3001.seo'] }} |
            
            **Main Branch (http://localhost:3000)**
            | Metric               | Score |
            | -------------------- | ----- |
            | Performance          | ${{ steps.lighthouse.outputs['http://localhost:3000.performance'] }} |
            | Accessibility        | ${{ steps.lighthouse.outputs['http://localhost:3000.accessibility'] }} |
            | Best Practices       | ${{ steps.lighthouse.outputs['http://localhost:3000.best-practices'] }} |
            | SEO                  | ${{ steps.lighthouse.outputs['http://localhost:3000.seo'] }} |
